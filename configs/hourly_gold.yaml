# Configuration for Quaternion Neural Networks
# Gold Forex / Spot Gold (XAUUSD=X) Hourly Forecasting Project

# Data settings
data:
  # Data source
  ticker: "XAUUSD=X"  # Spot Gold Forex
  interval: "1h"  # Hourly data
  # Use period for rolling window (Yahoo Finance hourly limit: ~730 days)
  period: "730d"
  cache_dir: "data/cache"

  # Window settings
  # 72 bars = ~3 days for Forex markets (5 days/week, ~24 hours/day)
  # ~23 bars/day average
  window_size: 72
  target_col: 3  # Close price

  # Split ratios (70/10/20)
  train_ratio: 0.70
  val_ratio: 0.10
  test_ratio: 0.20
  # Expected data points: ~12,500 total
  # Train: ~8,750 | Val: ~1,250 | Test: ~2,500

# Model settings
model:
  type: "real_lstm"  # Options: real_lstm, real_lstm_attention, quaternion_lstm, quaternion_lstm_attention
  hidden_size: 64
  num_layers: 2
  dropout: 0.1

# Training settings
training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  patience: 10  # Early stopping patience
  seed: 42
  # Gradient clipping for training stability
  max_grad_norm: 1.0
  # Learning rate scheduler (optional)
  scheduler:
    type: "reduce_on_plateau"
    factor: 0.5
    patience: 5

# Evaluation settings
evaluation:
  metrics:
    - mae
    - mse
    - mape
    - directional_accuracy
    - sharpe_ratio

# Device settings
device: "cuda"  # Options: cuda, cpu, mps

# Output settings
output:
  results_dir: "experiments/results/hourly_gold"
  checkpoint_dir: "checkpoints/hourly_gold"
